<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Used Cars Performance Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2e4a;--navy-light:#e8eef5;
  --meta:#1877F2;--meta-light:#dbeafe;
  --google:#EA4335;--google-light:#fee2e2;
  --combined:#2E4057;--combined-light:#edf0f4;
  --border:#e2e8f0;--bg:#f8fafc;--surface:#fff;--surface2:#f1f5f9;
  --text:#0f172a;--text2:#64748b;--text3:#94a3b8;
  --green:#16a34a;--green-bg:#f0fdf4;--green-border:#86efac;
  --red:#dc2626;--red-bg:#fef2f2;--red-border:#fca5a5;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-border:#fcd34d;
  --ok-bg:#f0fdf4;--ok-text:#166534;--ok-border:#86efac;
  --err-bg:#fff7ed;--err-text:#9a3412;--err-border:#fdba74;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
.page{max-width:1100px;margin:0 auto;padding:24px 20px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{width:42px;height:42px;border-radius:10px;background:var(--navy);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0}
.brand-title{font-size:18px;font-weight:600;line-height:1.2}
.brand-sub{font-size:12px;color:var(--text2);margin-top:2px}
.msg{padding:10px 16px;border-radius:var(--r);font-size:13px;margin-bottom:16px;display:none;border:1px solid}
.msg.ok{background:var(--ok-bg);color:var(--ok-text);border-color:var(--ok-border)}
.msg.err{background:var(--err-bg);color:var(--err-text);border-color:var(--err-border)}
#loadingState{display:none;align-items:center;justify-content:center;gap:12px;padding:40px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:20px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:26px}
.tab{padding:11px 22px;font-size:13px;font-weight:400;color:var(--text2);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;font-family:inherit;margin-bottom:-2px;display:flex;align-items:center;gap:6px;transition:color .15s}
.tab i{font-size:15px}
.tab.active{color:var(--navy);font-weight:600;border-bottom-color:var(--navy)}
.tab:hover:not(.active){color:var(--text)}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 16px;flex-wrap:wrap}
.fl{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.filter-bar select{font-size:13px;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer}
.seg-btns{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.seg-btn{padding:7px 16px;font-size:12px;font-weight:500;background:var(--surface);color:var(--text2);border:none;cursor:pointer;font-family:inherit;white-space:nowrap}
.seg-btn.active{background:var(--navy);color:#fff}
.seg-btn:not(:last-child){border-right:1px solid var(--border)}
.summary-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:10px;margin-bottom:22px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
.sum-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.sum-value{font-size:20px;font-weight:700;color:var(--text)}
.sum-sub{font-size:11px;color:var(--text2);margin-top:3px}
.city-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:18px;overflow:hidden}
.city-header{padding:13px 20px;display:flex;align-items:center;gap:10px;background:var(--navy)}
.city-name{font-size:15px;font-weight:600;color:#fff}
.city-header i{font-size:17px;color:rgba(255,255,255,.7)}
.city-body{padding:16px 20px}
.plat-section{margin-bottom:16px}
.plat-section:last-child{margin-bottom:0}
.plat-label{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 11px;border-radius:20px;margin-bottom:10px}
.plat-combined{background:var(--combined-light);color:var(--combined)}
.plat-meta{background:var(--meta-light);color:var(--meta)}
.plat-google{background:var(--google-light);color:var(--google)}
.plat-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px}
.kpi-card{background:var(--surface2);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border)}
.kpi-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;font-weight:600;margin-bottom:5px}
.kpi-value{font-size:21px;font-weight:700;line-height:1;color:var(--text)}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:3px}
.divider{height:1px;background:var(--border);margin:14px 0}
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.table-toolbar{display:flex;align-items:center;gap:12px;padding:13px 17px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.toolbar-title{font-size:14px;font-weight:600}
.tfilter{display:flex;align-items:center;gap:7px}
.tfilter label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.tfilter select{font-size:12px;padding:5px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;max-width:200px}
.row-count{margin-left:auto;font-size:12px;color:var(--text2);background:var(--surface);border:1px solid var(--border);padding:4px 10px;border-radius:20px;white-space:nowrap}
.table-outer{overflow-x:auto}
.table-scroll{max-height:520px;overflow-y:auto}
.table-scroll table{width:100%;border-collapse:collapse;min-width:860px}
.table-scroll thead{position:sticky;top:0;z-index:5}
.table-scroll thead tr{background:var(--surface2);box-shadow:0 1px 0 var(--border)}
.table-scroll th{padding:10px 12px;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;text-align:right;white-space:nowrap;border-bottom:2px solid var(--border);background:var(--surface2)}
.table-scroll th.left{text-align:left}
.table-scroll th.center{text-align:center}
.table-scroll td{padding:8px 12px;font-size:13px;border-bottom:1px solid #f1f5f9;text-align:right;white-space:nowrap;color:var(--text)}
.table-scroll td.left{text-align:left}
.table-scroll td.center{text-align:center}
.table-scroll tr:last-child td{border-bottom:none}
.table-scroll tbody tr:hover{background:#f8fafc}
.table-scroll tbody tr:nth-child(even){background:#fafbfc}
.plat-pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.pill-google{background:var(--google-light);color:var(--google)}
.pill-meta{background:var(--meta-light);color:var(--meta)}
.empty-state{padding:40px;text-align:center;color:var(--text2);font-size:13px}
.empty-state i{font-size:28px;color:var(--text3);display:block;margin-bottom:6px}
.ana-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:14px}
.ana-table-head{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.ana-table-head i{color:var(--navy)}
.atable{width:100%;border-collapse:collapse}
.atable th{padding:8px 10px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;text-align:right;white-space:nowrap;border-bottom:2px solid var(--border);background:var(--surface2)}
.atable th.left{text-align:left}
.atable td{padding:8px 10px;font-size:12px;border-bottom:1px solid #f1f5f9;text-align:right;white-space:nowrap}
.atable td.left{text-align:left;font-weight:500}
.atable tr:last-child td{border-bottom:none}
.atable tbody tr:hover{background:#f8fafc}
.atable tfoot td{font-weight:700;background:var(--navy-light);color:var(--navy);border-top:2px solid var(--border);font-size:12px}
.wow-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.wow-card-header{padding:11px 16px;background:var(--navy);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.wow-row{padding:10px 16px;border-bottom:1px solid #f1f5f9;display:grid;grid-template-columns:60px 1fr 1fr 70px;gap:8px;align-items:center}
.wow-row:last-child{border-bottom:none}
.wow-row:nth-child(even){background:#fafbfc}
.wow-week{font-size:11px;font-weight:700;color:var(--navy);background:var(--navy-light);border-radius:4px;padding:2px 7px;text-align:center}
.wow-col{font-size:11px}
.wow-col .val{font-size:14px;font-weight:700;color:var(--text)}
.wow-col .sub{font-size:10px;color:var(--text2);margin-top:1px}
.wow-col .dates{font-size:10px;color:var(--text3)}
.chg{font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px;text-align:center;white-space:nowrap}
.chg-up{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.chg-dn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.chg-na{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
</style>
</head>
<body>
<div class="page">

<div class="topbar">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-car"></i></div>
    <div>
      <div class="brand-title">Used Cars Performance Dashboard</div>
      <div class="brand-sub">Meta + Google &nbsp;&middot;&nbsp; Ahmedabad &nbsp;&middot;&nbsp; Chandigarh &nbsp;&middot;&nbsp; Nashik</div>
    </div>
  </div>
</div>

<div id="msgBox" class="msg"></div>
<div id="loadingState">
  <div class="spinner"></div>
  <span style="font-size:13px;color:var(--text2)">Loading latest data from Excel files&hellip;</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab(0)"><i class="ti ti-building-skyscraper"></i>City performance</button>
  <button class="tab" onclick="switchTab(1)"><i class="ti ti-calendar-stats"></i>Campaign day-wise</button>
  <button class="tab" onclick="switchTab(2)"><i class="ti ti-calendar-due"></i>Per Day Avg</button>
</div>

<div id="tab0">
  <div class="filter-bar">
    <span class="fl"><i class="ti ti-filter" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>View</span>
    <div class="seg-btns">
      <button class="seg-btn active" onclick="setT0Mode('single',this)">Single month</button>
      <button class="seg-btn" onclick="setT0Mode('compare',this)">Compare months</button>
    </div>
    <span class="fl" id="t0singleLabel" style="margin-left:8px">Month</span>
    <select id="t0month" onchange="renderTab0()"></select>
    <span class="fl" id="t0cmpLabel" style="display:none;margin-left:8px">Base</span>
    <select id="t0cmpBase" onchange="renderTab0()" style="display:none"></select>
    <span class="fl" id="t0cmpVsLabel" style="display:none;margin-left:4px">vs</span>
    <select id="t0cmpComp" onchange="renderTab0()" style="display:none"></select>
  </div>
  <div id="summaryStrip"></div>
  <div id="cityCards"></div>
  <div id="t0WeekSection" style="display:none;margin-top:24px"></div>
</div>

<div id="tab1" style="display:none">
  <div class="filter-bar">
    <span class="fl"><i class="ti ti-filter" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>Month</span>
    <select id="t1month" onchange="onT1MonthChange()"></select>
  </div>
  <div class="table-card">
    <div class="table-toolbar">
      <span class="toolbar-title">Day-wise campaign performance</span>
      <div class="tfilter"><label>City</label><select id="t1city" onchange="onT1CityChange()"></select></div>
      <div class="tfilter"><label>Campaign</label><select id="t1camp" onchange="renderTab1()"></select></div>
      <span class="row-count" id="rowCount">— rows</span>
    </div>
    <div class="table-outer"><div class="table-scroll">
      <table>
        <thead><tr>
          <th class="left" style="width:80px">Date</th>
          <th class="left" style="width:96px">City</th>
          <th class="center" style="width:72px">Platform</th>
          <th class="left" style="width:190px">Campaign</th>
          <th style="width:96px">Spends</th>
          <th style="width:76px">Gen leads</th>
          <th style="width:78px">Gen CPL</th>
          <th style="width:76px">Triggered</th>
          <th style="width:78px">Trig CPL</th>
          <th style="width:88px">Dealer trigs</th>
          <th style="width:82px">Dealer CPL</th>
        </tr></thead>
        <tbody id="t1body"></tbody>
      </table>
    </div></div>
  </div>
</div>

<div id="tab2" style="display:none">
  <div class="filter-bar">
    <span class="fl"><i class="ti ti-filter" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i>City</span>
    <select id="t3city" onchange="renderTab3()">
      <option value="All">All cities</option>
    </select>
    <span class="fl" style="margin-left:8px">Platform</span>
    <select id="t3plat" onchange="renderTab3()">
      <option value="All">All platforms</option>
      <option value="Google">Google</option>
      <option value="Meta">Meta</option>
    </select>
  </div>
  <div id="t3content"></div>
</div>

</div>
<script>
// ── XLSX LIBRARY LOADER (tries 3 CDNs, calls loadDataFromRepo once ready) ────
(function(){
  var cdns = [
    'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
    'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
    'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
  ];
  var idx = 0;
  function tryNext(){
    if(idx >= cdns.length){
      var el = document.getElementById('msgBox');
      if(el){ el.className='msg err'; el.textContent='Could not load Excel parser. Check internet connection and reload.'; el.style.display='block'; }
      var ld = document.getElementById('loadingState');
      if(ld) ld.style.display='none';
      return;
    }
    var s = document.createElement('script');
    s.src = cdns[idx++];
    s.onload = function(){
      if(typeof loadDataFromRepo === 'function') loadDataFromRepo();
    };
    s.onerror = tryNext;
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
var DATA = [];

// ── CAMP MAP ──────────────────────────────────────────────────────────────────
var CAMP_MAP={
  'AHM-Search-Buy-Used-Car-8april':   {city:'Ahmedabad',  platform:'Google'},
  'CHD-Buyer-Acquisition-6April':     {city:'Chandigarh', platform:'Google'},
  'Nashik-Search-Buy-UsedCar-8april': {city:'Nashik',     platform:'Google'},
  'Nasik-Search-Buy-UsedCar-8april':  {city:'Nashik',     platform:'Google'},
  'AHM-UCR-Catalogue-Ads':            {city:'Ahmedabad',  platform:'Meta'},
  'Chandigarh-UCR-Catalogue-Ads':     {city:'Chandigarh', platform:'Meta'},
  'Nashik-UCR-Catalogue-Ads':         {city:'Nashik',     platform:'Meta'},
};
function getCity(c){return (CAMP_MAP[c]||{}).city||c;}
function getPlatform(c){return (CAMP_MAP[c]||{}).platform||'Unknown';}
function getMonth(d){var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mn[d.getUTCMonth()]+"'"+String(d.getUTCFullYear()).slice(2);}
function toDateStr(d){var yr=d.getUTCFullYear(),mo=String(d.getUTCMonth()+1).padStart(2,'0'),dy=String(d.getUTCDate()).padStart(2,'0');return yr+'-'+mo+'-'+dy;}
function wom(ds){var day=parseInt(ds.slice(8,10));return Math.floor((day-1)/7)+1;}

// ── FORMAT ────────────────────────────────────────────────────────────────────
var INR=function(n){return(!n||!isFinite(n)||n===0)?'—':'₹'+Math.round(n).toLocaleString('en-IN');};
var NUM=function(n){return(!n&&n!==0)||n===0?'—':n.toLocaleString('en-IN');};
function cpl(sp,leads){return leads>0&&sp>0?sp/leads:null;}

function agg(rows){
  var s=rows.reduce(function(a,r){return{sp:a.sp+r.spends,gl:a.gl+r.gen_leads,tr:a.tr+r.triggered,dt:a.dt+r.dealer_triggers};},{sp:0,gl:0,tr:0,dt:0});
  return Object.assign(s,{gcpl:cpl(s.sp,s.gl),tcpl:cpl(s.sp,s.tr),dcpl:cpl(s.sp,s.dt)});
}

function getMetricVal(a, key){
  if(key==='gl')   return a.gl;
  if(key==='tr')   return a.tr;
  if(key==='dt')   return a.dt;
  if(key==='sp')   return a.sp;
  if(key==='gcpl') return a.gcpl;
  if(key==='tcpl') return a.tcpl;
  if(key==='dcpl') return a.dcpl;
  return 0;
}
function fmtMetric(v,key){
  if(v==null||!isFinite(v)) return '—';
  if(key==='sp'||key==='gcpl'||key==='tcpl'||key==='dcpl') return INR(v);
  return NUM(Math.round(v));
}
var METRIC_LABEL={'gl':'Gen Leads','tr':'Triggered','dt':'Dealer Trigs','sp':'Spends','gcpl':'Gen CPL','tcpl':'Trig CPL','dcpl':'Dealer CPL'};

function kpiSection(d,label,cls,dot){
  return '<div class="plat-section"><div class="plat-label '+cls+'"><span class="plat-dot" style="background:'+dot+'"></span>'+label+'</div>'
    +'<div class="kpi-grid">'
    +'<div class="kpi-card"><div class="kpi-label">Spends</div><div class="kpi-value">'+INR(d.sp)+'</div></div>'
    +'<div class="kpi-card"><div class="kpi-label">Gen leads</div><div class="kpi-value">'+NUM(d.gl)+'</div><div class="kpi-sub">CPL: '+INR(d.gcpl)+'</div></div>'
    +'<div class="kpi-card"><div class="kpi-label">Triggered leads</div><div class="kpi-value">'+NUM(d.tr)+'</div><div class="kpi-sub">CPL: '+INR(d.tcpl)+'</div></div>'
    +'<div class="kpi-card"><div class="kpi-label">Dealer triggers</div><div class="kpi-value">'+NUM(d.dt)+'</div><div class="kpi-sub">CPL: '+INR(d.dcpl)+'</div></div>'
    +'</div></div>';
}

function getMonths(){var s=new Set(DATA.map(function(r){return r.month;}));return['All'].concat(Array.from(s).sort());}
function populateSelect(id,opts,val){
  var el=document.getElementById(id),prev=val||el.value;
  el.innerHTML=opts.map(function(o){return'<option value="'+o+'"'+(o===prev?' selected':'')+'>'+o+'</option>';}).join('');
}

// ── TAB 0 ─────────────────────────────────────────────────────────────────────
var T0_MODE = 'single';
var CITY_ORDER=['Nashik','Chandigarh','Ahmedabad'];
  function sortCities(arr){return arr.slice().sort(function(a,b){var ia=CITY_ORDER.indexOf(a),ib=CITY_ORDER.indexOf(b);return(ia===-1?99:ia)-(ib===-1?99:ib);});}
var MONTH_NUM={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
function monthSortKey(ms){var p=ms.split("'");return (2000+parseInt(p[1]))*100+(MONTH_NUM[p[0]]||0);}

function setT0Mode(mode, btn){
  T0_MODE = mode;
  document.querySelectorAll('#tab0 .seg-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  // toggle pickers
  var single = mode === 'single';
  document.getElementById('t0singleLabel').style.display = single ? '' : 'none';
  document.getElementById('t0month').style.display       = single ? '' : 'none';
  document.getElementById('t0cmpLabel').style.display    = single ? 'none' : '';
  document.getElementById('t0cmpVsLabel').style.display  = single ? 'none' : '';
  document.getElementById('t0cmpBase').style.display     = single ? 'none' : '';
  document.getElementById('t0cmpComp').style.display     = single ? 'none' : '';
  document.getElementById('t0WeekSection').style.display = single ? 'none' : '';
  renderTab0();
}

function renderTab0(){
  var isCmp = T0_MODE === 'compare';

  // ── SINGLE MODE ────────────────────────────────────────────────────────────
  if(!isCmp){
    var month = document.getElementById('t0month').value;
    var rows  = month === 'All' ? DATA : DATA.filter(function(r){return r.month===month;});
    var tot   = agg(rows);
    document.getElementById('summaryStrip').innerHTML =
      '<div class="summary-strip">'
      +'<div class="sum-card"><div class="sum-label">Total spends</div><div class="sum-value">'+INR(tot.sp)+'</div><div class="sum-sub">All cities · all platforms</div></div>'
      +'<div class="sum-card"><div class="sum-label">Gen leads</div><div class="sum-value">'+NUM(tot.gl)+'</div><div class="sum-sub">CPL: '+INR(tot.gcpl)+'</div></div>'
      +'<div class="sum-card"><div class="sum-label">Triggered leads</div><div class="sum-value">'+NUM(tot.tr)+'</div><div class="sum-sub">CPL: '+INR(tot.tcpl)+'</div></div>'
      +'<div class="sum-card"><div class="sum-label">Dealer triggers</div><div class="sum-value">'+NUM(tot.dt)+'</div><div class="sum-sub">CPL: '+INR(tot.dcpl)+'</div></div>'
      +'</div>';
    var cities = sortCities([...new Set(rows.map(function(r){return r.city;}))]);
    document.getElementById('cityCards').innerHTML = cities.map(function(city){
      var cd   = rows.filter(function(r){return r.city===city;});
      var com  = agg(cd);
      var meta = agg(cd.filter(function(r){return r.Platform==='Meta';}));
      var goog = agg(cd.filter(function(r){return r.Platform==='Google';}));
      return '<div class="city-card">'
        +'<div class="city-header"><i class="ti ti-building-skyscraper"></i><span class="city-name">'+city+'</span></div>'
        +'<div class="city-body">'
        +kpiSection(com, 'Combined (Meta + Google)', 'plat-combined', '#2E4057')
        +'<div class="divider"></div>'
        +kpiSection(meta, 'Meta', 'plat-meta', '#1877F2')
        +'<div class="divider"></div>'
        +kpiSection(goog, 'Google', 'plat-google', '#EA4335')
        +'</div></div>';
    }).join('') || '<div class="empty-state"><i class="ti ti-inbox"></i>No data.</div>';
    document.getElementById('t0WeekSection').style.display = 'none';
    return;
  }

  // ── COMPARE MODE ────────────────────────────────────────────────────────────
  var bm    = document.getElementById('t0cmpBase').value;
  var cm    = document.getElementById('t0cmpComp').value;
  var bRows = DATA.filter(function(r){return r.month===bm;});
  var cRows = DATA.filter(function(r){return r.month===cm;});

  /* ── helpers ── */
  function pct(c,p){ return p&&p!==0?(c-p)/Math.abs(p)*100:null; }
  function ptag(p,good){
    if(p===null) return '<span style="font-size:10px;color:var(--text3)">—</span>';
    var pos = good==='down' ? p<=0 : p>=0;
    var col = pos?'var(--green)':'var(--red)';
    var bg  = pos?'var(--green-bg)':'var(--red-bg)';
    return '<span style="background:'+bg+';color:'+col+';font-weight:700;font-size:10px;'
      +'padding:1px 7px;border-radius:20px;display:inline-block">'+(p>=0?'+':'')+p.toFixed(1)+'%</span>';
  }

  /* ── month completeness ── */
  var MONTH_DAYS={'Jan':31,'Feb':28,'Mar':31,'Apr':30,'May':31,'Jun':30,
                  'Jul':31,'Aug':31,'Sep':30,'Oct':31,'Nov':30,'Dec':31};
  function monthTotalDays(ms){
    var parts=ms.split("'"); return MONTH_DAYS[parts[0]]||30;
  }
  function isMonthComplete(rows, ms){
    if(!rows.length) return false;
    var dates=rows.map(function(r){return r.dateStr;}).sort();
    return parseInt(dates[dates.length-1].slice(8,10))===monthTotalDays(ms);
  }
  function completeWeeks(rows){
    // A week is complete if it has exactly 7 unique data dates
    var wMap={};
    rows.forEach(function(r){
      if(!wMap[r.wom]) wMap[r.wom]=new Set();
      wMap[r.wom].add(r.dateStr);
    });
    var cw=[];
    Object.keys(wMap).forEach(function(wn){
      if(wMap[wn].size===7) cw.push(parseInt(wn));
    });
    return cw.sort();
  }

  var bmComplete = isMonthComplete(bRows, bm);
  var cmComplete = isMonthComplete(cRows, cm);
  var bothComplete = bmComplete && cmComplete;

  // Weeks to show in WoW = weeks complete in COMPARISON (cm) month
  var cmCompleteWeeks = completeWeeks(cRows);
  // Intersect with base month data presence (base month may be partial but we still show if comp is complete)
  var wowWeeks = cmCompleteWeeks;

  var cities = sortCities([...new Set([...bRows,...cRows].map(function(r){return r.city;}))]);

  /* ═══════════════════════════════════════════════════════════════════════════
   * SECTION 1 — Overall + City cards (only if both months complete)
   * ═══════════════════════════════════════════════════════════════════════════*/
  if(bothComplete){
    var bTot=agg(bRows), cTot=agg(cRows);
    var kpiList=[
      {l:'Spends',       bv:bTot.sp,   cv:cTot.sp,   g:'neutral',fmt:INR},
      {l:'Gen Leads',    bv:bTot.gl,   cv:cTot.gl,   g:'up',     fmt:NUM},
      {l:'Gen CPL',      bv:bTot.gcpl, cv:cTot.gcpl, g:'down',   fmt:INR},
      {l:'Triggered',    bv:bTot.tr,   cv:cTot.tr,   g:'up',     fmt:NUM},
      {l:'Trig CPL',     bv:bTot.tcpl, cv:cTot.tcpl, g:'down',   fmt:INR},
      {l:'Dealer Trigs', bv:bTot.dt,   cv:cTot.dt,   g:'up',     fmt:NUM},
      {l:'Dealer CPL',   bv:bTot.dcpl, cv:cTot.dcpl, g:'down',   fmt:INR},
    ];
    document.getElementById('summaryStrip').innerHTML=
      '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:20px">'
      +'<div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">'
        +'Overall: '+bm+' vs '+cm
        +' &nbsp;<span style="font-weight:400;color:var(--text3)">(All cities · All platforms)</span>'
      +'</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px">'
      +kpiList.map(function(k){
        return '<div style="background:var(--surface2);border-radius:var(--r);padding:10px 12px;border:1px solid var(--border)">'
          +'<div style="font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">'+k.l+'</div>'
          +'<div style="font-size:11px;color:var(--text2);margin-bottom:3px">'+k.fmt(k.bv)+' <span style="color:var(--text3)">→</span> '+k.fmt(k.cv)+'</div>'
          +ptag(pct(k.cv,k.bv),k.g)
          +'</div>';
      }).join('')
      +'</div></div>';

    function cmpSection(bA,cA,platLabel,dot,cls){
      var rows2=[
        {l:'Spends',       bv:bA.sp,   cv:cA.sp,   g:'neutral',fmt:INR},
        {l:'Gen Leads',    bv:bA.gl,   cv:cA.gl,   g:'up',     fmt:NUM},
        {l:'Gen CPL',      bv:bA.gcpl, cv:cA.gcpl, g:'down',   fmt:INR},
        {l:'Triggered',    bv:bA.tr,   cv:cA.tr,   g:'up',     fmt:NUM},
        {l:'Trig CPL',     bv:bA.tcpl, cv:cA.tcpl, g:'down',   fmt:INR},
        {l:'Dealer Trigs', bv:bA.dt,   cv:cA.dt,   g:'up',     fmt:NUM},
        {l:'Dealer CPL',   bv:bA.dcpl, cv:cA.dcpl, g:'down',   fmt:INR},
      ];
      return '<div class="plat-section">'
        +'<div class="plat-label '+cls+'"><span class="plat-dot" style="background:'+dot+'"></span>'+platLabel+'</div>'
        +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:8px">'
        +rows2.map(function(k){
          return '<div class="kpi-card">'
            +'<div class="kpi-label">'+k.l+'</div>'
            +'<div style="font-size:11px;color:var(--text2);margin-bottom:3px">'+k.fmt(k.bv)+' <span style="color:var(--text3)">→</span> '+k.fmt(k.cv)+'</div>'
            +ptag(pct(k.cv,k.bv),k.g)
            +'</div>';
        }).join('')
        +'</div></div>';
    }

    document.getElementById('cityCards').innerHTML=cities.map(function(city){
      var bd=bRows.filter(function(r){return r.city===city;});
      var cd=cRows.filter(function(r){return r.city===city;});
      return '<div class="city-card">'
        +'<div class="city-header"><i class="ti ti-building-skyscraper"></i>'
          +'<span class="city-name">'+city+'</span>'
          +'<span style="margin-left:auto;font-size:11px;color:rgba(255,255,255,.65)">'+bm+' → '+cm+'</span>'
        +'</div>'
        +'<div class="city-body">'
        +cmpSection(agg(bd),agg(cd),'Combined (Meta + Google)','#2E4057','plat-combined')
        +'<div class="divider"></div>'
        +cmpSection(agg(bd.filter(function(r){return r.Platform==='Meta';})),
                    agg(cd.filter(function(r){return r.Platform==='Meta';})),'Meta','#1877F2','plat-meta')
        +'<div class="divider"></div>'
        +cmpSection(agg(bd.filter(function(r){return r.Platform==='Google';})),
                    agg(cd.filter(function(r){return r.Platform==='Google';})),'Google','#EA4335','plat-google')
        +'</div></div>';
    }).join('');

  } else {
    // Not both complete — hide summary and city cards
    document.getElementById('summaryStrip').innerHTML=
      '<div style="background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--r);'
      +'padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--amber)">'
      +'<i class="ti ti-info-circle" style="margin-right:6px;vertical-align:-1px"></i>'
      +'<b>'+cm+'</b> is not yet complete — showing week-on-week data only for completed weeks.'
      +'</div>';
    document.getElementById('cityCards').innerHTML='';
  }

  /* ═══════════════════════════════════════════════════════════════════════════
   * SECTION 2 — Week-on-Week (always shown; weeks = complete weeks of cm month)
   * Columns: Week | Google Spends | Meta Spends | Total Spends |
   *          Gen Leads | Gen CPL | Triggered | Trig CPL | Dealer Trigs | Dealer CPL
   * ═══════════════════════════════════════════════════════════════════════════*/
  var wsec=document.getElementById('t0WeekSection');
  wsec.style.display='';

  var TH='padding:7px 10px;font-size:10px;font-weight:700;color:var(--text2);'
    +'text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border);white-space:nowrap;';
  var thL=TH+'text-align:left;background:var(--surface2)';
  var thR=TH+'text-align:right;background:var(--surface2)';
  var thG=TH+'text-align:right;background:#fdecea;color:var(--google)';
  var thM=TH+'text-align:right;background:#dbeafe;color:var(--meta)';

  function weekTable(bBase, cBase){
    var GROUPS=[
      {lbl:'Spends',       gk:'sp',   mk:'sp',   tk:'sp',   good:'neutral',fmt:INR},
      {lbl:'Gen Leads',    gk:'gl',   mk:'gl',   tk:'gl',   good:'up',     fmt:NUM},
      {lbl:'Gen CPL',      gk:'gcpl', mk:'gcpl', tk:'gcpl', good:'down',   fmt:INR},
      {lbl:'Triggered',    gk:'tr',   mk:'tr',   tk:'tr',   good:'up',     fmt:NUM},
      {lbl:'Trig CPL',     gk:'tcpl', mk:'tcpl', tk:'tcpl', good:'down',   fmt:INR},
      {lbl:'Dealer Trigs', gk:'dt',   mk:'dt',   tk:'dt',   good:'up',     fmt:NUM},
      {lbl:'Dealer CPL',   gk:'dcpl', mk:'dcpl', tk:'dcpl', good:'down',   fmt:INR},
    ];
    var TD='padding:5px 7px;font-size:11px;text-align:right;border-bottom:1px solid #f1f5f9;vertical-align:top;';
    var TH10='padding:6px 8px;font-size:10px;font-weight:700;border-bottom:2px solid var(--border);text-align:right;white-space:nowrap;';

    /* Row 1 — group labels spanning 3 cols each */
    var hdr1='<th style="'+thL+'" rowspan="2">Week</th>';
    GROUPS.forEach(function(g,gi){
      var bl=gi===0?'':'border-left:2px solid var(--border);';
      hdr1+='<th colspan="3" style="'+TH10+bl+'background:var(--surface2);text-align:center">'+g.lbl+'</th>';
    });

    /* Row 2 — Google / Meta / Total sub-headers */
    var hdr2='';
    GROUPS.forEach(function(g,gi){
      var bl=gi===0?'':'border-left:2px solid var(--border);';
      hdr2+='<th style="'+TH10+bl+'background:#fdecea;color:var(--google);font-size:9px">'
              +'<i class="ti ti-brand-google" style="font-size:9px;vertical-align:-1px"></i> G</th>'
            +'<th style="'+TH10+'background:#dbeafe;color:var(--meta);font-size:9px">'
              +'<i class="ti ti-brand-facebook" style="font-size:9px;vertical-align:-1px"></i> M</th>'
            +'<th style="'+TH10+'background:var(--navy-light);color:var(--navy);font-size:9px;font-weight:800">Total</th>';
    });

    var html='<div style="overflow-x:auto">'
      +'<table style="width:100%;border-collapse:collapse;min-width:1300px">'
      +'<thead>'
      +'<tr style="background:var(--surface2)">'+hdr1+'</tr>'
      +'<tr>'+hdr2+'</tr>'
      +'</thead><tbody>';

    wowWeeks.forEach(function(wn){
      var bw=bBase.filter(function(r){return r.wom===wn;});
      var cw=cBase.filter(function(r){return r.wom===wn;});
      var ba=agg(bw),   ca=agg(cw);
      var baG=agg(bw.filter(function(r){return r.Platform==='Google';}));
      var caG=agg(cw.filter(function(r){return r.Platform==='Google';}));
      var baM=agg(bw.filter(function(r){return r.Platform==='Meta';}));
      var caM=agg(cw.filter(function(r){return r.Platform==='Meta';}));
      var db=bw.map(function(r){return r.dateStr;}).sort();
      var dc=cw.map(function(r){return r.dateStr;}).sort();
      var drb=db.length?db[0].slice(5)+'\u2013'+db[db.length-1].slice(5):'\u2014';
      var drc=dc.length?dc[0].slice(5)+'\u2013'+dc[dc.length-1].slice(5):'\u2014';

      function vcell(bv,cv,good,fmt,bl){
        var p=pct(cv,bv);
        var border=bl?'border-left:2px solid var(--border);':'';
        return '<td style="'+TD+border+'">'
          +'<div style="color:var(--text3);font-size:10px">'+fmt(bv)+'</div>'
          +'<div style="font-weight:600;color:var(--text);margin-top:1px">'+fmt(cv)+'</div>'
          +ptag(p,good)
          +'</td>';
      }

      var row='<tr>'
        +'<td style="padding:6px 10px;font-size:12px;border-bottom:1px solid #f1f5f9;white-space:nowrap;vertical-align:middle">'
          +'<div style="font-weight:700;color:var(--navy)">W'+wn+'</div>'
          +'<div style="font-size:9px;color:var(--text3)">'+bm+': '+drb+'</div>'
          +'<div style="font-size:9px;color:var(--text3)">'+cm+': '+drc+'</div>'
        +'</td>';

      GROUPS.forEach(function(g,gi){
        var bl=gi===0?false:true;
        row+=vcell(baG[g.gk],caG[g.gk],g.good,g.fmt,bl);  /* Google */
        row+=vcell(baM[g.mk],caM[g.mk],g.good,g.fmt,false); /* Meta */
        row+=vcell(ba[g.tk], ca[g.tk], g.good,g.fmt,false); /* Total */
      });
      row+='</tr>';
      html+=row;
    });

    html+='</tbody></table></div>';
    return html;
  }

  var cityGroups=[['All cities',null]].concat(cities.map(function(c){return [c,c];}));
  var wowHtml='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-top:4px">'
    +'<div style="padding:12px 20px;background:var(--navy);display:flex;align-items:center;gap:8px">'
      +'<i class="ti ti-calendar-week" style="font-size:16px;color:rgba(255,255,255,.8)"></i>'
      +'<span style="font-size:13px;font-weight:600;color:#fff">Week-on-Week — '+bm+' vs '+cm+'</span>'
      +'<span style="margin-left:auto;font-size:11px;color:rgba(255,255,255,.5)">'
        +'Showing complete weeks of '+cm+': '+wowWeeks.map(function(w){return 'W'+w;}).join(', ')
      +'</span>'
    +'</div>';

  cityGroups.forEach(function(cg){
    var label=cg[0], cf=cg[1];
    var bBase=cf?bRows.filter(function(r){return r.city===cf;}):bRows;
    var cBase=cf?cRows.filter(function(r){return r.city===cf;}):cRows;
    if(!wowWeeks.length) return;
    wowHtml+='<div style="padding:14px 20px;border-bottom:1px solid var(--border)">'
      +'<div style="font-size:11px;font-weight:700;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:6px">'
        +(cf?'<i class="ti ti-building-skyscraper" style="font-size:12px"></i>':'<i class="ti ti-world" style="font-size:12px"></i>')
        +label
      +'</div>'
      +weekTable(bBase, cBase)
      +'</div>';
  });

  wowHtml+='</div>';
  wsec.innerHTML=wowHtml;
}

// ── TAB 1 ─────────────────────────────────────────────────────────────────────
function onT1MonthChange(){document.getElementById('t1city').value='All';document.getElementById('t1camp').value='All';rebuildT1Dropdowns();renderTab1();}
function onT1CityChange(){document.getElementById('t1camp').value='All';rebuildT1CampDropdown();renderTab1();}
function rebuildT1Dropdowns(){
  var month=document.getElementById('t1month').value;
  var mRows=month==='All'?DATA:DATA.filter(function(r){return r.month===month;});
  populateSelect('t1city',['All'].concat(sortCities([...new Set(mRows.map(function(r){return r.city;}))])),'All');
  rebuildT1CampDropdown();
}
function rebuildT1CampDropdown(){
  var month=document.getElementById('t1month').value,city=document.getElementById('t1city').value;
  var rows=month==='All'?DATA:DATA.filter(function(r){return r.month===month;});
  if(city!=='All')rows=rows.filter(function(r){return r.city===city;});
  populateSelect('t1camp',['All'].concat([...new Set(rows.map(function(r){return r.campaign;}))].sort()),'All');
}
function renderTab1(){
  var month=document.getElementById('t1month').value,city=document.getElementById('t1city').value,camp=document.getElementById('t1camp').value;
  var rows=month==='All'?DATA:DATA.filter(function(r){return r.month===month;});
  if(city!=='All')rows=rows.filter(function(r){return r.city===city;});
  if(camp!=='All')rows=rows.filter(function(r){return r.campaign===camp;});
  document.getElementById('rowCount').textContent=rows.length+' rows';
  var tbody=document.getElementById('t1body');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="11" class="empty-state">No data.</td></tr>';return;}
  tbody.innerHTML=rows.map(function(r){
    var gc=cpl(r.spends,r.gen_leads),tc=cpl(r.spends,r.triggered),dc=cpl(r.spends,r.dealer_triggers);
    var pc=r.Platform==='Google'?'pill-google':'pill-meta';
    var cn=r.campaign.length>30?r.campaign.slice(0,28)+'…':r.campaign;
    return '<tr><td class="left">'+r.dateStr.slice(5)+'</td><td class="left">'+r.city+'</td>'
      +'<td class="center"><span class="plat-pill '+pc+'">'+r.Platform+'</span></td>'
      +'<td class="left" title="'+r.campaign+'">'+cn+'</td>'
      +'<td>'+INR(r.spends)+'</td><td>'+(r.gen_leads||'—')+'</td><td>'+INR(gc)+'</td>'
      +'<td>'+(r.triggered||'—')+'</td><td>'+INR(tc)+'</td>'
      +'<td>'+(r.dealer_triggers||'—')+'</td><td>'+INR(dc)+'</td></tr>';
  }).join('');
}

// ── TAB 2: ANALYSIS ───────────────────────────────────────────────────────────
// ── TAB 3: PER DAY AVG ───────────────────────────────────────────────────────
function renderTab3(){
  var cityFilter=document.getElementById('t3city').value;
  var platFilter=document.getElementById('t3plat').value;
  var cities=sortCities([...new Set(DATA.map(function(r){return r.city;}))]);
  var cityEl=document.getElementById('t3city');
  if(cityEl.options.length<=1){
    cities.forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c;cityEl.appendChild(o);});
  }
  cityEl.value=cityFilter;
  var MDAYS={Jan:31,Feb:28,Mar:31,Apr:30,May:31,Jun:30,Jul:31,Aug:31,Sep:30,Oct:31,Nov:30,Dec:31};
  var MNUM={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  var months=[...new Set(DATA.map(function(r){return r.month;}))].sort(function(a,b){return monthSortKey(a)-monthSortKey(b);});
  function activeDays(rows){return new Set(rows.filter(function(r){return r.gen_leads>0||r.spends>0;}).map(function(r){return r.dateStr;})).size||1;}
  function getA(rows){
    var sp=0,gl=0,tr=0,dt=0;
    rows.forEach(function(r){sp+=r.spends;gl+=r.gen_leads;tr+=r.triggered;dt+=r.dealer_triggers;});
    return{sp:sp,gl:gl,tr:tr,dt:dt,gcpl:gl>0&&sp>0?sp/gl:0,tcpl:tr>0&&sp>0?sp/tr:0,dcpl:dt>0&&sp>0?sp/dt:0};
  }
  function pct(c,p){return p&&p!==0?(c-p)/Math.abs(p)*100:null;}
  function ptag(p,good){
    if(p===null)return '<span style="color:var(--text3);font-size:10px">—</span>';
    var pos=good==='down'?p<=0:p>=0;
    var col=pos?'var(--green)':'var(--red)';
    var bg=pos?'var(--green-bg)':'var(--red-bg)';
    return '<span style="background:'+bg+';color:'+col+';font-weight:700;font-size:10px;padding:1px 7px;border-radius:20px;display:inline-block">'+(p>=0?'+':'')+p.toFixed(1)+'%</span>';
  }
  function fa(v,isI){
    if(v===0||v===null||v===undefined)return '—';
    if(isI)return '₹'+v.toLocaleString('en-IN',{maximumFractionDigits:0});
    return v.toLocaleString('en-IN',{maximumFractionDigits:1});
  }
  var TH='padding:8px 10px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border);white-space:nowrap;background:var(--surface2);';
  var THL=TH+'text-align:left;';
  var THR=TH+'text-align:right;';
  var THG=TH+'text-align:right;background:#fdecea;color:var(--google);';
  var THM=TH+'text-align:right;background:#dbeafe;color:var(--meta);';
  var THN=TH+'text-align:right;background:var(--navy-light);color:var(--navy);font-weight:800;';
  var THCHG=TH+'text-align:right;background:var(--combined-light);color:var(--combined);';
  var TD='padding:6px 8px;font-size:12px;text-align:right;border-bottom:1px solid #f1f5f9;';
  var KPIS=[
    {lbl:'Spends / day',       k:'sp',   good:'neutral',isI:true},
    {lbl:'Gen Leads / day',    k:'gl',   good:'up',     isI:false},
    {lbl:'Gen CPL',            k:'gcpl', good:'down',   isI:true},
    {lbl:'Triggered / day',    k:'tr',   good:'up',     isI:false},
    {lbl:'Trig CPL',           k:'tcpl', good:'down',   isI:true},
    {lbl:'Dealer Trigs / day', k:'dt',   good:'up',     isI:false},
    {lbl:'Dealer CPL',         k:'dcpl', good:'down',   isI:true},
  ];
  var cityGroups=cityFilter==='All'
    ?[{lbl:'All Cities',f:null}].concat(cities.map(function(c){return{lbl:c,f:c};}))
    :[{lbl:cityFilter,f:cityFilter}];

  var explanation='<div style="background:var(--navy-light);border:1px solid var(--border);border-radius:var(--r);padding:12px 18px;margin-bottom:20px;font-size:12px;color:var(--text2);line-height:1.6">'
    +'<i class="ti ti-info-circle" style="color:var(--navy);margin-right:5px;font-size:13px;vertical-align:-1px"></i>'
    +'<b style="color:var(--navy)">Per Day Average</b> normalises each month by its active data days so months of different lengths are fairly comparable. '
    +'<b>G</b> = Google only &nbsp;|&nbsp; <b>M</b> = Meta only &nbsp;|&nbsp; <b>Total</b> = combined. '
    +'CPL is computed on monthly totals (not divided by days). '
    +'<b style="color:var(--green)">▲ green</b> = improvement &nbsp; <b style="color:var(--red)">▼ red</b> = decline.'
    +'</div>';

  var html=explanation;

  cityGroups.forEach(function(cg){
    var monthData=months.map(function(m){
      var rows=DATA.filter(function(r){return r.month===m;});
      if(cg.f) rows=rows.filter(function(r){return r.city===cg.f;});
      if(platFilter!=='All') rows=rows.filter(function(r){return r.Platform===platFilter;});
      var rowsG=rows.filter(function(r){return r.Platform==='Google';});
      var rowsM=rows.filter(function(r){return r.Platform==='Meta';});
      var days=activeDays(rows);
      var calDays=MDAYS[m.split("'")[0]]||30;
      return{m:m,days:days,calDays:calDays,a:getA(rows),aG:getA(rowsG),aM:getA(rowsM)};
    });

    var cityIcon=cg.f
      ?'<i class="ti ti-building-skyscraper" style="font-size:14px;opacity:.8"></i>'
      :'<i class="ti ti-world" style="font-size:14px;opacity:.8"></i>';

    // Active days strip
    var daysStrip='<div style="display:flex;gap:0;border-bottom:1px solid var(--border)">'
      +monthData.map(function(md){
        return '<div style="flex:1;padding:8px 12px;border-right:1px solid var(--border);text-align:center">'
          +'<div style="font-size:12px;font-weight:600;color:var(--text)">'+md.m+'</div>'
          +'<div style="font-size:10px;color:var(--text2)">'+md.days+' active / '+md.calDays+' cal days</div>'
          +'</div>';
      }).join('')+'</div>';

    // Table header row 1: month labels spanning G/M/Total + chg col
    var hdr1='<tr><th style="'+THL+'" rowspan="2">KPI</th>';
    monthData.forEach(function(md,mi){
      var bl=mi===0?'':'border-left:2px solid var(--border);';
      hdr1+='<th colspan="3" style="'+THR+bl+'text-align:center;font-size:11px">'+md.m+'</th>';
      if(mi>0) hdr1+='<th style="'+THCHG+'font-size:10px;text-align:center">vs '+monthData[mi-1].m+'</th>';
    });
    hdr1+='</tr>';

    // Table header row 2: G / M / Total sub-labels
    var hdr2='<tr>';
    monthData.forEach(function(md,mi){
      var bl=mi===0?'':'border-left:2px solid var(--border);';
      hdr2+='<th style="'+THG+bl+'font-size:9px"><i class="ti ti-brand-google" style="font-size:9px;vertical-align:-1px"></i> G</th>'
           +'<th style="'+THM+'font-size:9px"><i class="ti ti-brand-facebook" style="font-size:9px;vertical-align:-1px"></i> M</th>'
           +'<th style="'+THN+'font-size:9px">Total</th>';
      if(mi>0) hdr2+='<th style="'+THCHG+'font-size:9px">Δ%</th>';
    });
    hdr2+='</tr>';

    // Data rows: one per KPI
    var bodyRows='';
    KPIS.forEach(function(kpi,ki){
      var rowBg=ki%2===0?'':'background:#fafbfc';
      var row='<tr style="'+rowBg+'"><td style="padding:7px 10px;font-size:12px;font-weight:600;color:var(--text);border-bottom:1px solid #f1f5f9;white-space:nowrap">'+kpi.lbl+'</td>';
      var prevTotal=null;
      monthData.forEach(function(md,mi){
        var days=md.days;
        // per-day value: CPL uses total ratio, volume metrics divide by days
        function pdv(a,k){return(k==='gcpl'||k==='tcpl'||k==='dcpl')?a[k]:a[k]/days;}
        var gv=pdv(md.aG,kpi.k), mv=pdv(md.aM,kpi.k), tv=pdv(md.a,kpi.k);
        var bl=mi===0?'':'border-left:2px solid var(--border);';
        row+='<td style="'+TD+bl+'color:var(--google)">'+fa(gv,kpi.isI)+'</td>'
            +'<td style="'+TD+'color:var(--meta)">'+fa(mv,kpi.isI)+'</td>'
            +'<td style="'+TD+'font-weight:700;color:var(--text)">'+fa(tv,kpi.isI)+'</td>';
        if(mi>0){
          var p=pct(tv,prevTotal);
          row+='<td style="'+TD+'background:var(--combined-light)">'+ptag(p,kpi.good)+'</td>';
        }
        prevTotal=tv;
      });
      row+='</tr>';
      bodyRows+=row;
    });

    html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:22px">'
      +'<div style="padding:12px 20px;background:var(--navy);display:flex;align-items:center;gap:8px">'
        +cityIcon
        +'<span style="font-size:13px;font-weight:600;color:#fff">'+cg.lbl+'</span>'
        +'<span style="margin-left:auto;font-size:11px;color:rgba(255,255,255,.5)">Per-day averages · active days shown below each month</span>'
      +'</div>'
      +daysStrip
      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:700px"><thead>'
      +hdr1+hdr2
      +'</thead><tbody>'+bodyRows+'</tbody></table></div></div>';
  });

  document.getElementById('t3content').innerHTML=html;
}



// ── AUTO-FETCH ENGINE ────────────────────────────────────────────────────────
// Reads data.xlsx and Used_Cars_Spends.xlsx from the same GitHub Pages repo.
// No upload needed — just update the files in your repo and reload the page.

var CAMP_MAP_FETCH = {
  'AHM-Search-Buy-Used-Car-8april':   {city:'Ahmedabad',  platform:'Google'},
  'CHD-Buyer-Acquisition-6April':     {city:'Chandigarh', platform:'Google'},
  'Nashik-Search-Buy-UsedCar-8april': {city:'Nashik',     platform:'Google'},
  'Nasik-Search-Buy-UsedCar-8april':  {city:'Nashik',     platform:'Google'},
  'AHM-UCR-Catalogue-Ads':            {city:'Ahmedabad',  platform:'Meta'},
  'Chandigarh-UCR-Catalogue-Ads':     {city:'Chandigarh', platform:'Meta'},
  'Nashik-UCR-Catalogue-Ads':         {city:'Nashik',     platform:'Meta'},
};

function showMsg(text, type){
  var el = document.getElementById('msgBox');
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
  if(type === 'ok') setTimeout(function(){ el.style.display='none'; }, 6000);
}

function parseLeads(wb){
  var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:null, raw:false});
  var map = {};
  rows.forEach(function(r){
    var _dt = r['Date'];
    var d = _dt ? (_dt instanceof Date ? _dt : new Date(String(_dt).replace(/\s/,'T'))) : null;
    if(!d || isNaN(d.getTime())) return;
    var rawCamp = (r['utm_campaign'] || '').trim();
    var camp = rawCamp === 'Nasik-Search-Buy-UsedCar-8april' ? 'Nashik-Search-Buy-UsedCar-8april' : rawCamp;
    var cm = CAMP_MAP_FETCH[camp] || {}; 
    var city = cm.city || camp;
    var plat = cm.platform || 'Unknown';
    var ds = toDateStr(d), mo = getMonth(d), w = wom(ds);
    var key = ds+'|'+camp+'|'+city+'|'+mo+'|'+w+'|'+plat;
    if(!map[key]) map[key] = {dateStr:ds, campaign:camp, city:city, month:mo, wom:w, Platform:plat,
                               spends:0, gen_leads:0, triggered:0, dealer_triggers:0};
    map[key].gen_leads        += Number(r['Total_lead']) || 0;
    map[key].triggered        += Number(r['Unique'])     || 0;
    if(r['Listing_Group'] === 'Dealer')
      map[key].dealer_triggers += Number(r['Unique'])    || 0;
  });
  return map;
}

function parseSpends(wb){
  var map = {};
  // GA sheet: Day | Campaign | Cost
  var gaSheet = wb.Sheets['Ga'];
  if(gaSheet){
    XLSX.utils.sheet_to_json(gaSheet, {defval:null, raw:false}).forEach(function(r){
      if(!(Number(r['Cost']) > 0)) return;
      var _dy = r['Day'];
      var d = _dy ? (_dy instanceof Date ? _dy : new Date(String(_dy).replace(/\s/,'T'))) : null;
      if(!d || isNaN(d.getTime())) return;
      var camp = (r['Campaign'] || '').trim(); if(!camp) return;
      camp = camp === 'Nasik-Search-Buy-UsedCar-8april' ? 'Nashik-Search-Buy-UsedCar-8april' : camp;
      var cm = CAMP_MAP_FETCH[camp] || {};
      var ds = toDateStr(d), mo = getMonth(d), w = wom(ds);
      var key = ds+'|'+camp+'|'+(cm.city||camp)+'|'+mo+'|'+w+'|'+(cm.platform||'Google');
      map[key] = (map[key]||0) + (Number(r['Cost'])||0);
    });
  }
  // FB sheet: Reporting starts | Campaign name | Amount spent (INR)
  var fbSheet = wb.Sheets['FB'];
  if(fbSheet){
    XLSX.utils.sheet_to_json(fbSheet, {defval:null, raw:false}).forEach(function(r){
      if(!(Number(r['Amount spent (INR)']) > 0)) return;
      var _rs = r['Reporting starts'];
      var d = _rs ? (_rs instanceof Date ? _rs : new Date(String(_rs).replace(/\s/,'T'))) : null;
      if(!d || isNaN(d.getTime())) return;
      var camp = (r['Campaign name'] || '').trim(); if(!camp) return;
      var cm = CAMP_MAP_FETCH[camp] || {};
      var ds = toDateStr(d), mo = getMonth(d), w = wom(ds);
      var key = ds+'|'+camp+'|'+(cm.city||camp)+'|'+mo+'|'+w+'|'+(cm.platform||'Meta');
      map[key] = (map[key]||0) + (Number(r['Amount spent (INR)'])||0);
    });
  }
  return map;
}

function mergeMaps(leadsMap, spendsMap){
  var merged = {};
  Object.keys(leadsMap).forEach(function(k){ merged[k] = Object.assign({}, leadsMap[k]); });
  Object.keys(spendsMap).forEach(function(k){
    if(merged[k]){
      merged[k].spends = Math.round(spendsMap[k]*100)/100;
    } else {
      var p = k.split('|');
      merged[k] = {dateStr:p[0], campaign:p[1], city:p[2], month:p[3],
                   wom:parseInt(p[4]), Platform:p[5],
                   spends:Math.round(spendsMap[k]*100)/100,
                   gen_leads:0, triggered:0, dealer_triggers:0};
    }
  });
  return Object.values(merged).sort(function(a,b){
    return a.dateStr.localeCompare(b.dateStr)||a.city.localeCompare(b.city);
  });
}

async function loadDataFromRepo(){
  var loadEl = document.getElementById('loadingState');
  try{
    loadEl.style.display = 'flex';

    // Hardcoded repo details — change these if you rename the repo
    var owner  = 'Marketing-dashboard';
    var repo   = 'used_cars_dashboard';
    var branch = 'main';

    // raw.githubusercontent.com ALWAYS serves the latest committed file,
    // completely bypassing GitHub Pages CDN cache.
    var base = 'https://raw.githubusercontent.com/'+owner+'/'+repo+'/'+branch+'/';

    function fetchFile(name){
      return fetch(base+name+'?t='+Date.now(),{cache:'no-store'})
        .then(function(r){
          if(!r.ok) throw new Error(name+' not found ('+r.status+'). Check repo: '+owner+'/'+repo);
          return r.arrayBuffer();
        });
    }

    var results = await Promise.all([fetchFile('data.xlsx'), fetchFile('Used_Cars_Spends.xlsx')]);

    var leadsWb  = XLSX.read(results[0],{type:'array',cellDates:true});
    var spendsWb = XLSX.read(results[1],{type:'array',cellDates:true});
    var leadsMap  = parseLeads(leadsWb);
    var spendsMap = parseSpends(spendsWb);
    DATA = mergeMaps(leadsMap, spendsMap);

    loadEl.style.display = 'none';
    reinitAll();

    var tot    = agg(DATA);
    var months = [...new Set(DATA.map(function(r){return r.month;}))];
    months.sort(function(a,b){return monthSortKey(a)-monthSortKey(b);});
    showMsg('\u2713 Data loaded \u2014 '+months.join(', ')+' | '+DATA.length+' rows | Spends: '+INR(tot.sp)+' | Gen Leads: '+NUM(tot.gl),'ok');

  }catch(e){
    document.getElementById('loadingState').style.display='none';
    showMsg('\u26a0 '+e.message,'err');
    reinitAll(); // show empty dashboard as fallback
  }
}


function switchTab(idx){
  ['tab0','tab1','tab2'].forEach(function(id,i){
    document.getElementById(id).style.display = i===idx ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active', i===idx);
  });
  if(idx===2) renderTab3();
}

function reinitAll(){
  var months=getMonths();
  var rawMonths=[...new Set(DATA.map(function(r){return r.month;}))].sort();
  populateSelect('t0month',months);
  // Tab 0 compare dropdowns — raw months only (no "All")
  var t0RawMonths=[...new Set(DATA.map(function(r){return r.month;}))].sort();
  var t0Opts=t0RawMonths.map(function(m){return '<option value="'+m+'">'+m+'</option>';}).join('');
  document.getElementById('t0cmpBase').innerHTML=t0Opts;
  document.getElementById('t0cmpComp').innerHTML=t0Opts;
  if(t0RawMonths.length>=2){
    document.getElementById('t0cmpBase').value=t0RawMonths[0];
    document.getElementById('t0cmpComp').value=t0RawMonths[t0RawMonths.length>2?1:1];
  }
  populateSelect('t1month',months);
  rebuildT1Dropdowns();
  renderTab0();renderTab1();renderTab3();
}
// If XLSX was already cached in browser, the loader's onload may not fire.
// This catches that case.
if(typeof XLSX !== 'undefined' && typeof loadDataFromRepo === 'function'){
  loadDataFromRepo();
}
